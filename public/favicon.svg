<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="dieBg" x1="40" y1="40" x2="472" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d6ff2"/>
      <stop offset="1" stop-color="#4b31c4"/>
    </linearGradient>
    <linearGradient id="pip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6e3f7"/>
    </linearGradient>
  </defs>
  <!-- Die body -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#dieBg)"/>
  <!-- Subtle inset border -->
  <rect x="52" y="52" width="408" height="408" rx="84" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="10"/>
  <!-- Five pips -->
  <g fill="url(#pip)">
    <circle cx="150" cy="150" r="48"/>
    <circle cx="362" cy="150" r="48"/>
    <circle cx="256" cy="256" r="48"/>
    <circle cx="150" cy="362" r="48"/>
    <circle cx="362" cy="362" r="48"/>
  </g>
</svg>
